name: Publish Package
on:
  push:
    branches:
      - main
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
      - uses: pnpm/action-setup@v4
        with:
          standalone: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          # NOTE: intentionally no `registry-url`. It writes an .npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}` and a placeholder token, which shadows OIDC
          # trusted publishing (the placeholder is used instead → E404). Leaving it out
          # lets npm publish authenticate via the OIDC id-token exchange.
      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm version patch --no-git-tag-version
      - name: Push changes
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "Bump version [skip ci]"
          git push
      # Publish via npm Trusted Publishing (OIDC). No token needed: npm exchanges the
      # GitHub id-token (permissions.id-token: write) for a short-lived publish credential
      # and attaches provenance automatically. Requires a Trusted Publisher configured for
      # this package on npmjs.com (repo + this workflow filename). npm >= 11.5.1 is required
      # for OIDC trusted publishing, so upgrade the bundled npm first.
      - run: npm install -g npm@latest
      - run: npm publish
